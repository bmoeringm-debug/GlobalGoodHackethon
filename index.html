<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MatchU</title>
  <meta http-equiv="refresh" content="0; url=college-match.html" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #eef4fb;
      color: #12314c;
    }

    .card {
      width: min(92vw, 460px);
      background: #ffffff;
      border: 1px solid #d5e2f1;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(18, 49, 76, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 18px;
      line-height: 1.55;
      color: #516276;
    }

    a {
      display: inline-block;
      text-decoration: none;
      background: #123e61;
      color: #ffffff;
      padding: 11px 16px;
      border-radius: 10px;
      font-weight: 700;
    }
  </style>
  <script>
    window.location.replace("college-match.html");
  </script>
</head>
<body>
  <main class="card">
    <h1>MatchU</h1>
    <p>Redirecting to the app. If it does not open automatically, use the link below.</p>
    <a href="college-match.html">Open MatchU</a>
  </main>
</body>
</html>
