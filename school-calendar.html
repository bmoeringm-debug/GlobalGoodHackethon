<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Deadlines Calendar</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap");

    :root {
      --bg-1: #f5f8fd;
      --bg-2: #e8eef7;
      --surface: #ffffff;
      --surface-soft: #f7faff;
      --line: #d9e2ef;
      --text: #0f172a;
      --muted: #5b6475;
      --accent: #0f4e76;
      --accent-2: #1578a5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Manrope", "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 420px at -10% -10%, #dcecff 0%, transparent 65%),
        radial-gradient(980px 420px at 110% -15%, #d7f3ff 0%, transparent 60%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 18px 42px;
    }

    .hero {
      background: linear-gradient(130deg, #0f243d, #154766);
      color: #f8fbff;
      border-radius: 22px;
      padding: 26px;
      box-shadow: 0 18px 36px rgba(16, 35, 63, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.18);
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 0;
      color: #d6e8f6;
      line-height: 1.6;
    }

    .hero-actions, .toolbar, .event-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hero-actions {
      margin-top: 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 10px;
      padding: 9px 12px;
      font-weight: 700;
      font-size: 0.86rem;
      border: 1px solid #d3dfef;
      background: #eef3fa;
      color: #26435f;
      cursor: pointer;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: transparent;
    }

    .card {
      background: var(--surface);
      border-radius: 18px;
      padding: 18px;
      border: 1px solid var(--line);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.07);
      margin-bottom: 16px;
    }

    .toolbar {
      margin-bottom: 14px;
      align-items: center;
      justify-content: space-between;
    }

    .meta {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .month-section {
      margin-bottom: 18px;
    }

    .month-title {
      margin: 0 0 10px;
      font-size: 1.18rem;
      letter-spacing: -0.01em;
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .event-card {
      background: var(--surface-soft);
      border: 1px solid #dbe4f2;
      border-radius: 16px;
      padding: 16px;
    }

    .event-card h3 {
      margin: 0 0 6px;
      font-size: 1.04rem;
      letter-spacing: -0.01em;
    }

    .deadline-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 7px 10px;
      background: #e8f4ff;
      border: 1px solid #cfe2f5;
      color: #1f4c74;
      font-weight: 800;
      font-size: 0.82rem;
      margin: 8px 0 10px;
    }

    .empty {
      padding: 18px;
      border: 1px dashed #c8d6ea;
      border-radius: 14px;
      background: #f8fbff;
      color: var(--muted);
    }

    @media (max-width: 820px) {
      .events-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Deadlines Calendar</h1>
      <p>Track upcoming application deadlines for your saved schools and export them to Google Calendar or Outlook-friendly `.ics` files.</p>
      <div class="hero-actions">
        <a class="btn" href="index.html">Back to MatchU</a>
        <a class="btn" href="school-detail.html">School Detail Page</a>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div id="summary" class="meta">Loading deadlines...</div>
        <div class="event-actions">
          <button id="downloadAllBtn" class="btn primary" type="button">Download All (.ics)</button>
        </div>
      </div>
      <div id="calendarContent"></div>
    </div>
  </div>

  <script>
    const COLLEGE_CATALOG_STORAGE_KEY = "collegeMatchCatalogV1";
    const SAVED_SCHOOLS_STORAGE_KEY = "collegeMatchSavedSchoolsV1";

    function getCatalog() {
      const raw = localStorage.getItem(COLLEGE_CATALOG_STORAGE_KEY);
      if (!raw) return [];
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function getSavedSchoolNames() {
      const raw = localStorage.getItem(SAVED_SCHOOLS_STORAGE_KEY);
      if (!raw) return [];
      try {
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        if (!parsed.length) return [];
        return typeof parsed[0] === "string"
          ? parsed
          : parsed.map((school) => school.name).filter(Boolean);
      } catch (error) {
        return [];
      }
    }

    function parseUpcomingDeadline(deadlineLabel) {
      if (!deadlineLabel) return null;
      const cleaned = deadlineLabel.replace(/\./g, "").trim();
      const parts = cleaned.split(/\s+/);
      if (parts.length < 2) return null;

      const monthMap = {
        jan: 0, january: 0,
        feb: 1, february: 1,
        mar: 2, march: 2,
        apr: 3, april: 3,
        may: 4,
        jun: 5, june: 5,
        jul: 6, july: 6,
        aug: 7, august: 7,
        sep: 8, sept: 8, september: 8,
        oct: 9, october: 9,
        nov: 10, november: 10,
        dec: 11, december: 11
      };

      const monthKey = parts[0].toLowerCase();
      const month = monthMap[monthKey];
      const day = Number(parts[1]);
      if (month === undefined || !Number.isFinite(day)) return null;

      const now = new Date();
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      let year = startOfToday.getFullYear();
      let date = new Date(year, month, day);

      if (date < startOfToday) {
        year += 1;
        date = new Date(year, month, day);
      }

      return date;
    }

    function formatLongDate(date) {
      return date.toLocaleDateString(undefined, {
        month: "long",
        day: "numeric",
        year: "numeric"
      });
    }

    function toCalendarDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}${m}${d}`;
    }

    function toIsoDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function getGoogleCalendarUrl(event) {
      const endDate = new Date(event.date);
      endDate.setDate(endDate.getDate() + 1);
      const text = `${event.name} application deadline`;
      const details = `Application deadline for ${event.name}. Original label: ${event.deadlineLabel}.`;
      return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(text)}&dates=${toCalendarDate(event.date)}/${toCalendarDate(endDate)}&details=${encodeURIComponent(details)}`;
    }

    function buildIcs(events) {
      const now = new Date();
      const dtStamp = `${now.getUTCFullYear()}${String(now.getUTCMonth() + 1).padStart(2, "0")}${String(now.getUTCDate()).padStart(2, "0")}T${String(now.getUTCHours()).padStart(2, "0")}${String(now.getUTCMinutes()).padStart(2, "0")}${String(now.getUTCSeconds()).padStart(2, "0")}Z`;

      function escapeIcs(text) {
        return String(text)
          .replace(/\\/g, "\\\\")
          .replace(/\n/g, "\\n")
          .replace(/,/g, "\\,")
          .replace(/;/g, "\\;");
      }

      const lines = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//College Match//Deadlines Calendar//EN"
      ];

      events.forEach((event, index) => {
        const endDate = new Date(event.date);
        endDate.setDate(endDate.getDate() + 1);
        lines.push(
          "BEGIN:VEVENT",
          `UID:${toCalendarDate(event.date)}-${index}-${escapeIcs(event.name)}@college-match`,
          `DTSTAMP:${dtStamp}`,
          `DTSTART;VALUE=DATE:${toCalendarDate(event.date)}`,
          `DTEND;VALUE=DATE:${toCalendarDate(endDate)}`,
          `SUMMARY:${escapeIcs(event.name)} application deadline`,
          `DESCRIPTION:${escapeIcs(`Application deadline for ${event.name}. Original label: ${event.deadlineLabel}.`)}`,
          "END:VEVENT"
        );
      });

      lines.push("END:VCALENDAR");
      return lines.join("\r\n");
    }

    function downloadIcs(events, filename) {
      const blob = new Blob([buildIcs(events)], { type: "text/calendar;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function getSelectedSchools() {
      const catalog = getCatalog();
      const savedNames = getSavedSchoolNames();
      if (savedNames.length) {
        return savedNames
          .map((name) => catalog.find((school) => school.name === name))
          .filter(Boolean);
      }
      return catalog.filter((school) => school.deadline);
    }

    function renderCalendar() {
      const schools = getSelectedSchools();
      const events = schools
        .map((school) => ({
          ...school,
          date: parseUpcomingDeadline(school.deadline),
          deadlineLabel: school.deadline
        }))
        .filter((event) => event.date)
        .sort((a, b) => a.date - b.date);

      const summary = document.getElementById("summary");
      const content = document.getElementById("calendarContent");
      const downloadAllBtn = document.getElementById("downloadAllBtn");

      if (!events.length) {
        summary.textContent = "No saved-school deadlines found yet. Save schools on the main page to build your calendar.";
        content.innerHTML = '<div class="empty">There are no deadline events to show right now.</div>';
        downloadAllBtn.disabled = true;
        return;
      }

      summary.textContent = `${events.length} upcoming deadline${events.length === 1 ? "" : "s"} loaded from ${getSavedSchoolNames().length ? "saved schools" : "local catalog"}.`;
      downloadAllBtn.disabled = false;
      downloadAllBtn.onclick = () => downloadIcs(events, "college-deadlines.ics");

      const monthGroups = new Map();
      events.forEach((event) => {
        const key = event.date.toLocaleDateString(undefined, { month: "long", year: "numeric" });
        if (!monthGroups.has(key)) monthGroups.set(key, []);
        monthGroups.get(key).push(event);
      });

      content.innerHTML = Array.from(monthGroups.entries()).map(([monthLabel, monthEvents]) => `
        <section class="month-section">
          <h2 class="month-title">${monthLabel}</h2>
          <div class="events-grid">
            ${monthEvents.map((event) => `
              <div class="event-card">
                <h3>${event.name}</h3>
                <div class="meta">${event.region}, ${event.state} · ${event.isPrivate ? "Private" : "Public"}</div>
                <div class="deadline-badge">Deadline ${formatLongDate(event.date)}</div>
                <div class="meta">Original app label: ${event.deadlineLabel}</div>
                <div class="event-actions" style="margin-top:12px;">
                  <a class="btn primary" href="${getGoogleCalendarUrl(event)}" target="_blank" rel="noopener noreferrer">Google Calendar</a>
                  <button class="btn" type="button" data-action="outlook" data-name="${event.name.replace(/"/g, "&quot;")}">Outlook (.ics)</button>
                  <button class="btn" type="button" data-action="download" data-name="${event.name.replace(/"/g, "&quot;")}">Download .ics</button>
                </div>
              </div>
            `).join("")}
          </div>
        </section>
      `).join("");

      content.querySelectorAll("button[data-action]").forEach((button) => {
        button.addEventListener("click", () => {
          const event = events.find((item) => item.name === button.dataset.name);
          if (!event) return;
          const filename = `${event.name.toLowerCase().replace(/[^a-z0-9]+/g, "-")}-deadline.ics`;
          downloadIcs([event], filename);
        });
      });
    }

    renderCalendar();
  </script>
</body>
</html>
